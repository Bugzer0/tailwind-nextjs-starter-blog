name: Generate AI Blog Post — Glucose & Diabetes Health

on:
  # Chạy manual từ GitHub UI
  workflow_dispatch:
    inputs:
      topic:
        description: 'Chủ đề bài viết (để trống = AI tự chọn topic mới, không trùng bài cũ)'
        required: false
        type: string

  # Chạy tự động theo lịch (mỗi ngày lúc 8h sáng UTC+7 = 1h UTC)
  # schedule:
  #   - cron: '0 1 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/ai-blog-generator/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/ai-blog-generator/requirements.txt

      - name: Generate blog post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_TOPIC: ${{ inputs.topic }}
        run: python scripts/ai-blog-generator/generate_post.py

      - name: Commit and push
        env:
          POST_TITLE: ${{ steps.generate.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog/ public/static/images/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          TITLE="${POST_TITLE:-AI generated glucose/diabetes post}"
          git commit -m "🩺 New blog post: ${TITLE}"
          git push
